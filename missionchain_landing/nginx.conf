server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 301 redirects for moved root files → documents/
    location = /White_Paper.html { return 301 /documents/White_Paper.html; }
    location = /Glossary_Brand_Terms.html { return 301 /documents/Glossary_Brand_Terms.html; }
    location = /mc_seed_round.html { return 301 /documents/mc_seed_round.html; }
    location = /mc_announcement.html { return 301 /documents/mc_announcement.html; }

    # 301 redirects for old translations/{locale}/ → documents/{LANG}/
    location ~ ^/translations/es/(.+\.html)?$ {
        set $file $1;
        if ($file = "") { return 301 /documents/ES/index.html; }
        return 301 /documents/ES/$file;
    }
    location ~ ^/translations/ko/(.+\.html)?$ {
        set $file $1;
        if ($file = "") { return 301 /documents/KO/index.html; }
        return 301 /documents/KO/$file;
    }
    location ~ ^/translations/pt/(.+\.html)?$ {
        set $file $1;
        if ($file = "") { return 301 /documents/PT/index.html; }
        return 301 /documents/PT/$file;
    }
    location ~ ^/translations/vi/(.+\.html)?$ {
        set $file $1;
        if ($file = "") { return 301 /documents/VI/index.html; }
        return 301 /documents/VI/$file;
    }
    location = /translations/ { return 301 /; }
    location = /translations { return 301 /; }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /documents/ {
        try_files $uri =404;
    }

    location /frontend/documents/ {
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
