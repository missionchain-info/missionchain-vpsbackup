services:
  postgres:
    image: postgres:16-alpine
    container_name: mc-postgres
    restart: always
    environment:
      POSTGRES_DB: missionchain
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mc-network

  redis:
    image: redis:7-alpine
    container_name: mc-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - mc-network

  mc-api:
    build:
      context: ./deploy
      dockerfile: apps/api/Dockerfile
    container_name: mc-api
    restart: always
    env_file:
      - ./deploy/.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/missionchain
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 4000
      HOST: 0.0.0.0
      NODE_ENV: production
    ports:
      - "0.0.0.0:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - mc-network

  mc-world:
    image: mc-world:latest
    container_name: mc-world
    restart: always
    environment:
      PORT: 3002
      NEXT_PUBLIC_API_URL: https://api.missionchain.io
      NEXT_PUBLIC_INFO_URL: https://missionchain.io
      NEXT_PUBLIC_APP_URL: https://app.missionchain.io
    ports:
      - "0.0.0.0:3002:3002"
    networks:
      - mc-network

  mc-admin:
    image: mc-admin:latest
    container_name: mc-admin
    restart: always
    env_file: ./.env
    environment:
      PORT: 3003
      NEXT_PUBLIC_API_URL: https://api.missionchain.io
      NEXTAUTH_URL: https://admin.missionchain.io
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/missionchain
    ports:
      - "0.0.0.0:3003:3003"
    networks:
      - mc-network

  mc-app:
    image: nginx:alpine
    container_name: mc-app
    restart: always
    volumes:
      - ./deploy/apps/web/out:/usr/share/nginx/html:ro
      - ./deploy/apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:3005:80"
    networks:
      - mc-network

  mc-landing:
    image: nginx:alpine
    container_name: mc-landing
    restart: always
    volumes:
      - ./missionchain_landing:/usr/share/nginx/html:ro
      - ./missionchain_landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:3006:80"
    networks:
      - mc-network

networks:
  mc-network:
    driver: bridge
