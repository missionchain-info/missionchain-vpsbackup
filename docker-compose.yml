services:
  postgres:
    image: postgres:16-alpine
    container_name: mc-postgres
    restart: always
    environment:
      POSTGRES_DB: missionchain
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mc-network

  redis:
    image: redis:7-alpine
    container_name: mc-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - mc-network

  api:
    build:
      context: ./shared_api
      dockerfile: Dockerfile
    container_name: mc-api
    restart: always
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/missionchain
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 4000
      NODE_ENV: production
    ports:
      - "0.0.0.0:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mc-network

  mc-info:
    image: mc-info:latest
    container_name: mc-info
    restart: always
    volumes:
      - /var/www/missionchain-info:/var/www/missionchain-info:ro
    environment:
      PORT: 3001
      NEXT_PUBLIC_API_URL: https://api.missionchain.io/v1
      NEXT_PUBLIC_APP_URL: https://missionchain.io
      NEXT_PUBLIC_WORLD_URL: https://missionchain.world
    ports:
      - "0.0.0.0:3001:3001"
    networks:
      - mc-network

  mc-world:
    image: mc-world:latest
    container_name: mc-world
    restart: always
    environment:
      PORT: 3002
      NEXT_PUBLIC_API_URL: https://api.missionchain.io/v1
      NEXT_PUBLIC_INFO_URL: https://missionchain.info
      NEXT_PUBLIC_APP_URL: https://missionchain.io
    ports:
      - "0.0.0.0:3002:3002"
    networks:
      - mc-network

  mc-admin:
    image: mc-admin:latest
    container_name: mc-admin
    restart: always
    env_file: ./.env
    environment:
      PORT: 3003
      NEXT_PUBLIC_API_URL: https://api.missionchain.io/v1
      NEXTAUTH_URL: https://admin.missionchain.io
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/missionchain
    ports:
      - "0.0.0.0:3003:3003"
    depends_on:
      - api
    networks:
      - mc-network

networks:
  mc-network:
    driver: bridge
